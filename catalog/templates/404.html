{# templates/404.html #}
{% extends "catalog/base.html" %}
{% block title %}Page not found - BookShelf CMS{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-20 text-center">
    <!-- Icon -->
    <div class="mx-auto w-24 h-24 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-6">
        <svg class="w-12 h-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
    </div>

    <h1 class="font-serif text-3xl font-bold text-slate-900 dark:text-white">Page not found</h1>

    <!-- Error hint: shows the requested URL, just like the debug 404 -->
    <p class="mt-3 text-slate-500 dark:text-slate-400">
        We couldn't find anything at
        <code class="px-1.5 py-0.5 bg-slate-200 dark:bg-slate-700 rounded text-sm font-mono">{{ request_path }}</code>.
    </p>
    <p class="mt-2 text-sm text-slate-400 dark:text-slate-500">
        The page may have moved, or the URL might be misspelled.
    </p>

    <a href="{% url 'catalog:book_list' %}"
       class="mt-8 inline-flex items-center gap-2 rounded-full bg-primary-600 px-6 py-3 text-sm font-semibold text-white hover:bg-primary-700 transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Go to Catalog
    </a>
</div>
{% endblock %}
