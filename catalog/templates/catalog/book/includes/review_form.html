{% load static %}
<h2 class="mb-3"><i class="bi bi-chat-left-text-fill text-primary"></i> Add a new review</h2>
<form action="{% url 'catalog:book_review' book.slug %}" method="post" novalidate>
    {% csrf_token %}

    {% for field in form %}
    <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
        {% endif %}
        {% if field.help_text %}
            <div class="form-text">{{ field.help_text }}</div>
        {% endif %}
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary">
        <i class="bi bi-send-fill"></i> Add review
    </button>
</form>
