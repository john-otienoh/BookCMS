{% load static %}
<h2 class="font-serif text-xl font-bold text-slate-900 dark:text-white mb-6">Add a review</h2>
<form action="{% url 'catalog:book_review' book.slug %}" method="post" novalidate class="space-y-5">
    {% csrf_token %}
    {% for field in form %}
        <div>
            {% if field.field.widget.input_type == 'textarea' %}
                <textarea
                    name="{{ field.name }}"
                    id="{{ field.id_for_label }}"
                    class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                    placeholder="{{ field.label }}"
                    rows="4"
                >{{ field.value|default_if_none:'' }}</textarea>
            {% else %}
                <input
                    type="{{ field.field.widget.input_type }}"
                    name="{{ field.name }}"
                    id="{{ field.id_for_label }}"
                    class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                    placeholder="{{ field.label }}"
                    value="{{ field.value|default_if_none:'' }}"
                >
            {% endif %}
            {% if field.errors %}
                <p class="mt-1 text-sm text-red-500 dark:text-red-400">{{ field.errors|striptags }}</p>
            {% endif %}
            {% if field.help_text %}
                <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">{{ field.help_text }}</p>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit" class="inline-flex items-center gap-2 rounded-full bg-primary-600 px-6 py-3 text-sm font-semibold text-white shadow-sm hover:bg-primary-700 transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        Submit review
    </button>
</form>
